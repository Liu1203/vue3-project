server:
  port: 8080

spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # H2 开发环境（零安装，自动创建）
  # 切换到 MySQL 时，注释掉 h2 配置并取消注释 mysql 配置
  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    # -------- H2 (开发用) --------
    url: jdbc:h2:file:./data/blog;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

    # -------- MySQL (生产用，部署时切换) --------
    # url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # username: root
    # password: your_password

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: MyBlogSecretKey2026ForJwtTokenGenerationMustBeAtLeast256BitsLong
  expiration: 86400000
